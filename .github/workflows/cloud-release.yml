name: Cloud Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build & attach minitodo-cloud (Linux x86_64)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './cloud -> target'

      - name: Build release binary
        working-directory: cloud
        run: cargo build --release --locked

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          CLOUD_VERSION="$(awk -F\" '/^version/ {print $2; exit}' cloud/Cargo.toml)"
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            CLOUD_VERSION="${CLOUD_VERSION}-dev"
          fi
          STAGE="minitodo-cloud-${CLOUD_VERSION}-linux-x86_64"
          echo "version=$CLOUD_VERSION" >> "$GITHUB_OUTPUT"
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"

      - name: Stage release artifacts
        shell: bash
        run: |
          set -euo pipefail
          STAGE="${{ steps.ver.outputs.stage }}"
          DIST="$GITHUB_WORKSPACE/dist"
          OUT="$DIST/$STAGE"
          mkdir -p "$OUT"
          cp cloud/target/release/minitodo-cloud "$OUT/"
          cp cloud/config.example.toml cloud/README.md "$OUT/"
          cp -r cloud/deploy "$OUT/"
          rsync -a --exclude '__pycache__' --exclude '*.pyc' cloud/skill/ "$OUT/skill/"
          cd "$DIST"
          tar czf "$STAGE.tar.gz" "$STAGE"
          sha256sum "$STAGE.tar.gz" > "$STAGE.tar.gz.sha256"
          ls -lah "$STAGE.tar.gz"*

      - name: Attach cloud assets to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/minitodo-cloud-*.tar.gz
            dist/minitodo-cloud-*.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: minitodo-cloud-linux-x86_64
          path: |
            dist/minitodo-cloud-*.tar.gz
            dist/minitodo-cloud-*.tar.gz.sha256
          retention-days: 14
