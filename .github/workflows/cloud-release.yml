name: Cloud Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: '附加到的 release tag（如 v2.1.0）；留空则只上传 artifact'
        required: false
        type: string
        default: ''

jobs:
  build:
    name: Build & attach minitodo-cloud (Linux x86_64)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './cloud -> target'

      - name: Build release binary
        working-directory: cloud
        run: cargo build --release --locked

      - name: Resolve target tag and version
        id: ver
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TARGET_TAG="$GITHUB_REF_NAME"
          else
            TARGET_TAG="$INPUT_TAG"
          fi
          CLOUD_VERSION="$(awk -F\" '/^version/ {print $2; exit}' cloud/Cargo.toml)"
          if [[ -z "$TARGET_TAG" ]]; then
            CLOUD_VERSION="${CLOUD_VERSION}-dev"
          fi
          STAGE="minitodo-cloud-${CLOUD_VERSION}-linux-x86_64"
          echo "target_tag=$TARGET_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$CLOUD_VERSION" >> "$GITHUB_OUTPUT"
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"

      - name: Stage release artifacts
        shell: bash
        run: |
          set -euo pipefail
          STAGE="${{ steps.ver.outputs.stage }}"
          DIST="$GITHUB_WORKSPACE/dist"
          OUT="$DIST/$STAGE"
          mkdir -p "$OUT"
          cp cloud/target/release/minitodo-cloud "$OUT/"
          cp cloud/config.example.toml cloud/README.md "$OUT/"
          cp -r cloud/deploy "$OUT/"
          rsync -a --exclude '__pycache__' --exclude '*.pyc' cloud/skill/ "$OUT/skill/"
          cd "$DIST"
          tar czf "$STAGE.tar.gz" "$STAGE"
          sha256sum "$STAGE.tar.gz" > "$STAGE.tar.gz.sha256"
          ls -lah "$STAGE.tar.gz"*

      - name: Attach cloud assets to release
        if: steps.ver.outputs.target_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.target_tag }}
          files: |
            dist/minitodo-cloud-*.tar.gz
            dist/minitodo-cloud-*.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (no target tag)
        if: steps.ver.outputs.target_tag == ''
        uses: actions/upload-artifact@v4
        with:
          name: minitodo-cloud-linux-x86_64
          path: |
            dist/minitodo-cloud-*.tar.gz
            dist/minitodo-cloud-*.tar.gz.sha256
          retention-days: 14
